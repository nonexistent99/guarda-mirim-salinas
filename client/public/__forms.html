<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form
      name="memorias-guarda"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="memorias-guarda" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="relation" />
      <input type="text" name="approxYear" />
      <textarea name="message"></textarea>
      <input type="text" name="authorized" />
      <input name="bot-field" />
    </form>
  </body>
</html>
